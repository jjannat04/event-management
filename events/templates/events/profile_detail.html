{% extends 'events/base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto mt-10 p-8 bg-white shadow-lg rounded-lg border border-gray-200">
    <div class="text-center mb-8">
        <img src="{{ profile.profile_picture.url }}" alt="Profile Picture" class="w-32 h-32 rounded-full mx-auto object-cover border-4 border-blue-500">
        <h2 class="text-3xl font-bold mt-4 text-gray-800">{{ profile.user.username }}</h2>
        
        <p class="text-gray-500">{{ profile.user.email }}</p>
    </div>

    <div class="space-y-4 border-t pt-6">
        <div class="flex justify-between">
            <span class="font-bold text-gray-600">Full Name:</span>
            <span class="text-gray-800">{{ profile.user.get_full_name|default:"Not provided" }}</span>
        </div>
        <div class="flex justify-between">
            <span class="font-bold text-gray-600">Phone Number:</span>
            <span class="text-gray-800">{{ profile.phone_number|default:"Not provided" }}</span>
        </div>
    </div>

    <div class="mt-8 flex justify-center space-x-4">
        <a href="{% url 'profile_edit' %}" class="bg-blue-600 text-white px-6 py-2 rounded shadow hover:bg-blue-700">Edit Profile</a>
        <a href="{% url 'password_change' %}" class="bg-blue-600 text-white px-6 py-2 rounded shadow hover:bg-blue-700">Change Password</a>
        <a href="{% url 'event_list' %}" class="bg-gray-200 text-gray-700 px-6 py-2 rounded shadow hover:bg-gray-300">Back</a>
    </div>
</div>
{% endblock %}
