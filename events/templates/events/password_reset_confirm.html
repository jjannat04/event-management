{% extends 'events/base.html' %}
{% block content %}
<div class="max-w-md mx-auto mt-10 p-8 bg-white shadow-lg rounded-lg border border-gray-200">
    <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Set New Password</h2>
    
    {% if validlink %}
        <form method="post" class="space-y-4">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="w-full bg-green-600 text-white font-bold py-2 px-4 rounded hover:bg-green-700">Change Password</button>
        </form>
    {% else %}
        <div class="text-center">
            <p class="text-red-500 mb-4">The password reset link is invalid or has expired.</p>
            <a href="{% url 'password_reset' %}" class="text-blue-600 hover:underline">Request a new link</a>
        </div>
    {% endif %}
</div>
<style>
    input[type="password"] { width: 100%; padding: 8px; border: 1px solid #d1d5db; border-radius: 4px; margin-bottom: 10px; }
</style>
{% endblock %}
