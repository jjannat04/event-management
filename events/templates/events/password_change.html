{% extends 'events/base.html' %}
{% block content %}
<div class="max-w-md mx-auto mt-10 p-8 bg-white shadow-lg rounded-lg border border-gray-200">
    <h2 class="text-2xl font-bold mb-6 text-center">Change Your Password</h2>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded hover:bg-blue-700">Update Password</button>
    </form>
</div>
<style>
    input[type="password"] { width: 100%; padding: 8px; border: 1px solid #d1d5db; border-radius: 4px; }
</style>
{% endblock %}
