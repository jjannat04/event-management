{% extends 'events/base.html' %}

{% block content %}
<div class="max-w-xl mx-auto mt-10 p-6 bg-white rounded-xl shadow-md">
    <h2 class="text-2xl font-bold mb-4">Confirm Delete</h2>
    <p class="mb-6">Are you sure you want to delete <strong>{{ participant.name }}</strong>?</p>
    
    <form method="POST">
        {% csrf_token %}
        <div class="flex space-x-4">
            <button type="submit" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">Yes, Delete</button>
            <a href="{% url 'participant_list' %}" class="bg-gray-300 px-4 py-2 rounded hover:bg-gray-400">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
