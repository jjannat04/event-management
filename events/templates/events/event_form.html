{% extends 'events/base.html' %}
{% block title %}Create / Update Event{% endblock %}

{% block content %}
<h2 class="text-2xl font-semibold mb-4">{{ form.instance.id|yesno:"Update Event,Create Event" }}</h2>

<form method="POST" class="bg-white p-6 shadow rounded space-y-4">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded">
        Save
    </button>
</form>
{% endblock %}
