{% extends 'events/base.html' %}

{% block content %}

<div class="max-w-2xl mx-auto mt-10 p-8 bg-white shadow-lg rounded">
    <style>
    form input, form textarea, form select {
        width: 100%;
        padding: 0.5rem 1rem;
        border: 1px solid #d1d5db; /* gray-300 */
        border-radius: 0.5rem;      /* rounded-lg */
        margin-top: 0.25rem;
        margin-bottom: 1rem;
        outline: none;
    }
    form input:focus {
        border-color: #3b82f6;     /* blue-500 */
        ring: 2px #3b82f6;
    }
    </style>
    <h2 class="text-2xl font-bold mb-6">{% if form.instance.pk %}Edit{% else %}Create{% endif %} Event</h2>
    
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded mt-4">
            Save Event
        </button>
    </form>
</div>
{% endblock %}
