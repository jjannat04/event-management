{% extends 'events/base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto mt-10 p-8 bg-white shadow-lg rounded">
    <h2 class="text-2xl font-bold mb-6">{% if form.instance.pk %}Edit{% else %}Create{% endif %} Event</h2>
    
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded mt-4">
            Save Event
        </button>
    </form>
</div>
{% endblock %}
