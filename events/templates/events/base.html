<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Event Management{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <!-- Navbar -->
    <nav class="bg-blue-600 p-4 text-white">
        <div class="container mx-auto flex justify-between">
            <a href="{% url 'home' %}" class="font-bold">Event Management</a>
            <div class="space-x-4">
                <a href="{% url 'event_list' %}">Events</a>
                <a href="{% url 'participant_list' %}">Participants</a>
                <a href="{% url 'category_list' %}">Categories</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mx-auto mt-6">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
