{% extends 'events/base.html' %}

{% block content %}

<h2>Login</h2>
{% if error %}
<p class="text-red-500">{{ error }}</p>
{% endif %}
<form method="POST">
    {% csrf_token %}

    <label>Username</label>
    <input type="text" name="username">

    <label>Password</label>
    <input type="password" name="password">

    <button type="submit">Login</button>

</form>

{% endblock %}
