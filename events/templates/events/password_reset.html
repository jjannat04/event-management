{% extends 'events/base.html' %}
{% block content %}
<div class="max-w-md mx-auto mt-10 p-8 bg-white shadow-lg rounded-lg border border-gray-200">
    <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Reset Password</h2>
    <p class="text-gray-600 mb-4 text-sm">Enter your email address below to receive a password reset link.</p>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-2 px-4 rounded hover:bg-indigo-700">Send Reset Email</button>
    </form>
</div>
<style>
    input[type="email"] { width: 100%; padding: 8px; border: 1px solid #d1d5db; border-radius: 4px; }
</style>
{% endblock %}
